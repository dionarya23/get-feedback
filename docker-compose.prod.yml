version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: get_feedback_web
    restart: always
    ports:
      - "3095:3000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: get_feedback_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: get_feedback_db
    volumes:
      - mysql_prod_data:/var/lib/mysql

volumes:
  mysql_prod_data:
